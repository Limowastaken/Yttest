name: Download, Split, and Upload

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp and rar
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          pip install yt-dlp
          wget https://www.rarlab.com/rar/rarlinux-x64-7.1.1.tar.gz
          tar -xzf rarlinux-x64-7.1.1.tar.gz
          sudo cp rar/rar /usr/local/bin/
      - name: Download video
        run: |
          yt-dlp -f bestvideo+bestaudio --merge-output-format mp4 \
            -o "video.mp4" "${{ github.event.inputs.url }}"
      - name: Split into 80MB RAR volumes
        run: |
          rar a -v80m -m0 -ep1 output.rar video.mp4
      - name: Upload artifacts (expire in 1 day – GitHub minimum)
        uses: actions/upload-artifact@v4
        with:
          name: rar-parts
          path: output.part*.rar
          retention-days: 1
