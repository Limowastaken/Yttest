name: Download and Upload Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
      resolution:
        description: 'Resolution'
        required: true
        default: '720p'
        type: choice
        options:
          - 720p
          - 480p
          - 360p

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: |
          sudo apt-get update
          pip install yt-dlp
      - name: Set format selector
        run: |
          case "${{ github.event.inputs.resolution }}" in
            "720p")
              echo "FORMAT=bestvideo[height<=720]+bestaudio" >> $GITHUB_ENV
              ;;
            "480p")
              echo "FORMAT=bestvideo[height<=480]+bestaudio" >> $GITHUB_ENV
              ;;
            "360p")
              echo "FORMAT=bestvideo[height<=360]+bestaudio" >> $GITHUB_ENV
              ;;
          esac
      - name: Download video
        run: |
          yt-dlp -f "$FORMAT" --merge-output-format mp4 \
            -o "video.mp4" "${{ github.event.inputs.url }}"
      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: video.mp4
          retention-days: 1
