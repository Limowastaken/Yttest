name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube video URL'
        required: true
      resolution:
        description: 'Resolution'
        required: true
        default: '720p'
        type: choice
        options:
          - 720p
          - 480p
          - 360p

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp and ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Convert cookie string to Netscape format
        run: |
          cat > /tmp/convert.py << 'EOF'
          import os
          raw = os.environ['COOKIE_RAW']
          lines = ["# Netscape HTTP Cookie File"]
          for pair in raw.split(';'):
              if '=' not in pair:
                  continue
              name, value = pair.split('=', 1)
              name = name.strip()
              value = value.strip()
              lines.append(f".youtube.com\tTRUE\t/\tFALSE\t{2**31-1}\t{name}\t{value}")
          with open('cookies.txt', 'w') as f:
              f.write('\n'.join(lines))
          EOF
          python3 /tmp/convert.py
        env:
          COOKIE_RAW: ${{ secrets.YOUTUBE_COOKIE_RAW }}

      - name: Set format
        run: |
          case "${{ github.event.inputs.resolution }}" in
            "720p")
              echo "FORMAT=bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720]" >> $GITHUB_ENV
              ;;
            "480p")
              echo "FORMAT=bestvideo[height<=480][ext=mp4]+bestaudio[ext=m4a]/best[height<=480]" >> $GITHUB_ENV
              ;;
            "360p")
              echo "FORMAT=bestvideo[height<=360][ext=mp4]+bestaudio[ext=m4a]/best[height<=360]" >> $GITHUB_ENV
              ;;
          esac

      - name: Download video with cookies file
        run: |
          yt-dlp -f "$FORMAT" --merge-output-format mp4 \
            --cookies cookies.txt \
            --no-check-certificate \
            -o "video.mp4" "${{ github.event.inputs.url }}"

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: video.mp4
          retention-days: 1
